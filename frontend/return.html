<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirming — Kindred</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="brand"><span class="dot"></span><h1>Kindred</h1></div>

    <div class="card center" id="card">
      <div class="spinner" id="spinner"></div>
      <h2 id="title">Confirming your payment…</h2>
      <p class="desc" id="subtitle">Hang tight, this only takes a moment.</p>
      <div id="mandate-note"></div>
      <div id="actions"></div>
    </div>
  </div>

  <script>
    // Recover the payment id. Hyperswitch appends it to the return_url, but we
    // also stored it in sessionStorage as a fallback (e.g. after a 3DS redirect).
    const params = new URLSearchParams(window.location.search);
    const paymentId =
      params.get("payment_id") ||
      params.get("payment_intent") ||
      sessionStorage.getItem("hs_payment_id");

    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const spinner = document.getElementById("spinner");
    const mandateNote = document.getElementById("mandate-note");
    const actions = document.getElementById("actions");

    let tries = 0;
    const MAX_TRIES = 15; // ~30s

    async function poll() {
      tries++;
      try {
        const r = await fetch("/api/payment/" + encodeURIComponent(paymentId));
        const data = await r.json();
        if (data.status === "succeeded") return done(true, data.mandateId);
        if (data.status === "failed") return done(false);
      } catch (e) { /* keep polling */ }

      if (tries >= MAX_TRIES) return pending();
      setTimeout(poll, 2000);
    }

    function done(success, mandateId) {
      spinner.style.display = "none";
      if (success) {
        spinner.insertAdjacentHTML("afterend", '<div class="tick">✓</div>');
        title.textContent = "You're subscribed!";
        subtitle.textContent = "Your first box is on the way. We'll bill you monthly until you cancel.";
        if (mandateId) {
          mandateNote.innerHTML = '<p class="fine">Recurring billing set up · mandate <code class="k">' +
            mandateId + '</code></p>';
        }
      } else {
        title.textContent = "Payment didn't go through";
        subtitle.textContent = "No charge was made. Please try a different card.";
        actions.innerHTML = '<a href="/"><button class="primary">Try again</button></a>';
      }
    }

    function pending() {
      title.textContent = "Still processing";
      subtitle.innerHTML = "We haven't had final confirmation yet. If you're testing locally, " +
        "check that your webhook tunnel is running and pointed at the backend.";
      spinner.style.display = "none";
      actions.innerHTML = '<a href="/"><button class="primary">Back to store</button></a>';
    }

    if (!paymentId) {
      pending();
    } else {
      poll();
    }
  </script>
</body>
</html>
